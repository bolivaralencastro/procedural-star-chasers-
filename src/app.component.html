<div class="relative w-screen h-screen bg-black">
  <app-star-chasers 
    (toggleFullscreenRequest)="toggleFullscreen()"
    (openAboutRequest)="openAbout()"
    [isFullscreen]="isFullscreen()">
  </app-star-chasers>

  <!-- Central Clock and Date -->
  <app-particle-clock 
    [time]="formattedTime()" 
    [date]="formattedDate()">
  </app-particle-clock>

  <!-- Mobile Controls -->
  @if (isMobile()) {
    <div class="absolute bottom-4 right-4 pointer-events-auto z-50">
      <button
        type="button"
        (click)="toggleMobileMenu()"
        class="mobile-menu flex items-center justify-center w-12 h-12 rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-gray-200 shadow-lg hover:bg-white/10 transition-colors"
        title="Abrir menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  } @else {
    <!-- Desktop controls removed as requested -->
  }

  <!-- About Dialog -->
  <app-about-dialog #aboutDialog></app-about-dialog>
</div>
