name: Build and Deploy to GitHub Pages

on:
  # Publica sempre que houver push na branch main.
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissões necessárias para a Action publicar a página.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes; mantém apenas o mais recente.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        # base é relativo (base: './' no vite.config), então funciona sob o
        # sub-caminho do GitHub Pages sem precisar de flags extras.
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
